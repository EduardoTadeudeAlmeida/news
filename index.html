<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Notícias Tech</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="container">
            <h1>Global<span>News</span></h1>
            <nav>
                <button class="filter-btn active" data-category="general">Geral</button>
                <button class="filter-btn" data-category="technology">Tecnologia</button>
                <button class="filter-btn" data-category="business">Negócios</button>
                <button class="filter-btn" data-category="sports">Esportes</button>
                <button class="filter-btn" data-category="entertainment">Entretenimento</button>
            </nav>
        </div>
    </header>

    <main class="container">
        <section id="news-container" class="grid-noticias">
            <div class="loader">Carregando notícias...</div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Portal de Notícias Dinâmico - Feito com JS</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
